<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon { font-size: 2.4rem; }
    .logo h1   { font-size: 1.1rem; font-weight: 700; margin-top: 8px; color: #f1f5f9; }
    .logo p    { font-size: .8rem; color: #64748b; margin-top: 4px; }

    label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: .95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #3b82f6; }

    button {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: 4px;
    }
    button:hover:not(:disabled) { background: #1d4ed8; }
    button:disabled { opacity: .6; cursor: not-allowed; }

    .error {
      background: #450a0a;
      border: 1px solid #dc2626;
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .85rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <h1>Alumni Entry System</h1>
    <p>Admin Panel</p>
  </div>

  <div class="error" id="error"></div>

  <form id="loginForm">
    <label>Username</label>
    <input type="text" id="username" autocomplete="username" placeholder="admin" required>

    <label>Password</label>
    <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>

    <button type="submit" id="btn">Sign In</button>
  </form>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const err = document.getElementById('error');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const r = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      }),
    });

    if (r.ok) {
      window.location.href = '/';
    } else {
      const d = await r.json().catch(() => ({}));
      err.textContent = d.detail || 'Login failed';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
