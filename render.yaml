services:
  - type: web
    name: alumni-entry-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: alumni-data
      mountPath: /var/data
      sizeGB: 1
